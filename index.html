<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>POTA USA Boundary Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <link rel="stylesheet" href="styles.css?v=2026-04-14-1">
</head>
<body>
  <header class="topbar">
    <h1>POTA USA Boundary Map</h1>
    <p>Search a U.S. POTA park and draw park boundaries (when available) instead of only a point.</p>
  </header>

  <main class="layout">
    <section class="panel">
      <label for="parkSearch">Park Reference or Name</label>
      <input id="parkSearch" type="text" placeholder="Example: US-3062 or Antelope Island">
      <div id="results" class="results"></div>

      <div class="actions">
        <button id="loadBoundaryBtn" disabled>Load Boundary</button>
        <button id="clearBoundaryBtn" disabled>Clear Boundary</button>
      </div>

      <div id="status" class="status">Loading park index...</div>
      <div id="details" class="details"></div>

      <div class="diagnostics">
        <div class="actions log-actions">
          <button id="toggleDiagBtn" type="button">View Boundary Diagnostics</button>
          <button id="copyDiagBtn" type="button">Copy Diagnostics</button>
          <button id="clearDiagBtn" type="button">Clear Diagnostics</button>
        </div>
        <div id="diagSummary" class="status muted">No boundary diagnostics yet.</div>
        <pre id="diagOutput" class="issue-log" hidden></pre>
      </div>
    </section>

    <section class="mapwrap">
      <div id="map" aria-label="POTA park map"></div>
    </section>
  </main>

  <section class="prefetch prefetch-bottom">
    <label for="stateCodeInput">State Boundary Cache</label>
    <div class="actions">
      <input id="stateCodeInput" type="text" maxlength="2" placeholder="Example: CO">
      <button id="prefetchStateBtn">Warm State Cache</button>
    </div>
    <div id="prefetchStatus" class="status muted"></div>
    <div class="actions log-actions">
      <button id="toggleIssueLogBtn" type="button">View Issue Log</button>
      <button id="exportIssueLogBtn" type="button">Export Log</button>
      <button id="clearIssueLogBtn" type="button">Clear Log</button>
      <button id="exportBoundaryBundleBtn" type="button">Export Boundaries</button>
      <button id="importBoundaryBundleBtn" type="button">Import Boundaries</button>
      <button id="clearSessionCacheBtn" type="button">Clear Session Cache</button>
    </div>
    <input id="importBoundaryFileInput" type="file" accept="application/json" hidden>
    <div id="issueLogSummary" class="status muted"></div>
    <pre id="issueLogOutput" class="issue-log" hidden></pre>
  </section>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="https://unpkg.com/osmtogeojson@3.0.0-beta.5/osmtogeojson.js" crossorigin=""></script>
  <script src="app.js?v=2026-04-14-1"></script>
</body>
</html>
